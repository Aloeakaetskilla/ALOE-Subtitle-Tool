name: Build ALOE for Windows & macOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install faster-whisper ctranslate2 openai requests python-docx pyinstaller

      - name: Download yt-dlp
        run: |
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "yt-dlp.exe"

      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_tmp" -Force
          $bin = Get-ChildItem -Path "ffmpeg_tmp" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $bin.FullName "ffmpeg.exe"
          Remove-Item "ffmpeg.zip" -Force
          Remove-Item "ffmpeg_tmp" -Recurse -Force

      - name: Build with PyInstaller
        run: |
          cd src
          python -m PyInstaller ALOE.spec --noconfirm --clean

      - name: Copy binaries to dist
        run: |
          Copy-Item "yt-dlp.exe" "src/dist/ALOE字幕提取软件/"
          Copy-Item "ffmpeg.exe" "src/dist/ALOE字幕提取软件/"

      - name: Zip Windows build
        run: |
          Compress-Archive -Path "src/dist/ALOE字幕提取软件/*" -DestinationPath "ALOE-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ALOE-Windows
          path: ALOE-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install faster-whisper ctranslate2 openai requests python-docx pyinstaller

      - name: Download yt-dlp
        run: |
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" -o "yt-dlp"
          chmod +x yt-dlp

      - name: Download ffmpeg
        run: |
          curl -L "https://evermeet.cx/ffmpeg/getrelease/zip" -o ffmpeg.zip
          unzip -o ffmpeg.zip -d .
          chmod +x ffmpeg
          rm -f ffmpeg.zip

      - name: Build with PyInstaller
        run: |
          cd src
          python3 -m PyInstaller ALOE_macOS.spec --noconfirm --clean

      - name: Copy binaries to dist
        run: |
          cp yt-dlp "src/dist/ALOE字幕提取软件/"
          cp ffmpeg "src/dist/ALOE字幕提取软件/"
          cp src/修复macOS权限.command "src/dist/ALOE字幕提取软件/"
          chmod +x "src/dist/ALOE字幕提取软件/修复macOS权限.command"

      - name: Zip macOS build
        run: |
          cd src/dist && zip -r ../../ALOE-macOS.zip "ALOE字幕提取软件"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ALOE-macOS
          path: ALOE-macOS.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: ALOE 字幕提取软件 v${{ github.run_number }}
          body: |
            ## ALOE 字幕提取软件

            - 支持 12 种语言语音识别
            - 自动翻译 + DOCX 导出
            - 支持 YouTube / TikTok 等平台

            ### 下载说明
            - **ALOE-Windows.zip** — Windows 版，解压后双击 .exe 运行
            - **ALOE-macOS.zip** — macOS 版（Apple Silicon），解压后双击运行，首次打开如提示安全警告请右键→打开
          files: |
            artifacts/ALOE-Windows/ALOE-Windows.zip
            artifacts/ALOE-macOS/ALOE-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
